<style>
    :root {
        --page-bg: linear-gradient(135deg, #3b0d22 0%, #5f1238 38%, #5d1a72 72%, #34114c 100%);
        --panel: rgba(255, 247, 251, 0.93);
        --panel-edge: rgba(166, 73, 141, 0.18);
        --text: #351a44;
        --muted: #8a5d84;
        --primary: #e12b5d;
        --primary-strong: #8724b6;
        --bubble-bot: #fff0f6;
        --bubble-user: linear-gradient(135deg, #e12b5d, #8724b6);
        --input-bg: #fff9fc;
    }

    html,
    body {
        height: 100%;
        overflow: hidden;
        background:
            radial-gradient(circle at 14% 8%, rgba(255, 96, 138, 0.34), transparent 26%),
            radial-gradient(circle at 82% 12%, rgba(177, 73, 255, 0.28), transparent 28%),
            radial-gradient(circle at 50% 100%, rgba(112, 28, 146, 0.18), transparent 30%),
            var(--page-bg);
        color: var(--text);
    }

    .content {
        height: calc(100vh - 1cm);
        padding: 24px;
        overflow: hidden;
    }

    .dashboard {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        height: 100%;
        overflow: hidden;
    }

    .sidebar {
        background: var(--panel);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--panel-edge);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 42px rgba(31, 8, 35, 0.24);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
    }

        .profile {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(166, 73, 141, 0.14);
        }

    .avatar {
        width: 96px;
        height: 96px;
        margin: 0 auto 18px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(225, 43, 93, 0.16), rgba(134, 36, 182, 0.22));
        color: #b13f92;
    }

    .avatar svg {
        width: 52px;
        height: 52px;
    }

    .profile-title {
        margin: 0 0 6px;
        font-size: 20px;
        color: var(--text);
    }

    .profile-subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
    }

    .credentials {
        padding-top: 24px;
    }

    .upload-box {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(166, 73, 141, 0.14);
        min-height: 0;
        display: flex;
        flex-direction: column;
    }

    .upload-label {
        display: block;
        margin-bottom: 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-transform: uppercase;
    }

    .upload-box input[type="file"] {
        width: 100%;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--muted);
    }

    .upload-btn {
        width: 100%;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: white;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }

    .upload-btn:hover {
        background: linear-gradient(135deg, #f13d72, #9a33ca);
    }

    .upload-status {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
        word-break: break-word;
    }

    .stored-docs-list {
        max-height: 180px;
        overflow-y: auto;
        padding-right: 6px;
    }

    .chat-panel {
        background: var(--panel);
        border-radius: 24px;
        border: 1px solid var(--panel-edge);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 42px rgba(31, 8, 35, 0.24);
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
        min-height: 0;
    }

    .chat-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--panel-edge);
        background: linear-gradient(135deg, rgba(255, 233, 242, 0.94), rgba(246, 230, 255, 0.94));
    }

    .chat-title {
        margin: 0 0 6px;
        font-size: 22px;
        color: var(--text);
    }

    .chat-subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
    }

    .chat-space {
        padding: 24px;
        background: linear-gradient(180deg, #fffdfd 0%, #fff2f8 52%, #f7efff 100%);
        overflow-y: auto;
        min-height: 0;
    }

    .message {
        max-width: 70%;
        padding: 14px 16px;
        border-radius: 18px;
        margin-bottom: 14px;
        line-height: 1.5;
    }

    .message.bot {
        background: var(--bubble-bot);
        color: #5b2d56;
        border-top-left-radius: 4px;
        border: 1px solid rgba(225, 43, 93, 0.1);
    }

    .message.user {
        margin-left: auto;
        background: var(--bubble-user);
        color: white;
        border-top-right-radius: 4px;
        box-shadow: 0 12px 28px rgba(128, 33, 122, 0.22);
    }

        border-top: 1px solid var(--panel-edge);

    .chat-input {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 18px 24px 24px;
        border-top: 1px solid var(--panel-edge);
        background: linear-gradient(135deg, rgba(255, 239, 246, 0.92), rgba(247, 237, 255, 0.92));
        align-items: end;
    }

    .chat-input textarea {
        min-height: 50px;
        max-height: 150px;
        resize: none;
        overflow-y: auto;
        padding: 14px 16px;
        border: 1px solid rgba(166, 73, 141, 0.18);
        border-radius: 14px;
        font-size: 15px;
        background: var(--input-bg);
        color: var(--text);
        font-family: inherit;
    }

    .chat-input textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(225, 43, 93, 0.14);
    }

    .chat-input textarea::placeholder {
        color: #aa7da0;
    }

    .chat-input button {
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: white;
        width: 55px;
        height: 50px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        box-shadow: 0 12px 28px rgba(128, 33, 122, 0.24);
        transition: all 0.3s ease;
        align-self: end;
    }

    .chat-input button:hover {
        background: linear-gradient(135deg, #f13d72, #9a33ca);
        transform: translateY(-2px);
    }

    .chat-input button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    @media (max-width: 900px) {
        html,
        body {
            overflow: auto;
        }

        .dashboard {
            grid-template-columns: 1fr;
            height: auto;
            overflow: visible;
        }

        .content {
            height: auto;
            overflow: visible;
        }

        .sidebar,
        .chat-panel {
            overflow: visible;
        }
    }

    @media (max-width: 640px) {
        .content {
            padding: 16px;
        }

        .sidebar,
        .chat-panel {
            padding-left: 18px;
            padding-right: 18px;
        }

        .chat-panel {
            display: block;
        }

        .chat-space,
        .chat-input,
        .chat-header {
            padding-left: 18px;
            padding-right: 18px;
        }
    }
</style>

<div class="content">
    <div class="dashboard">
        <aside class="sidebar">
            <div class="profile">
                <div class="avatar" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-3.34 0-10 1.68-10 5v3h20v-3c0-3.32-6.66-5-10-5Z"/>
                    </svg>
                </div>
                <h2 class="profile-title">{{ username }}</h2>
                <p class="profile-subtitle">{{ role }}</p>
            </div>

            {% if can_upload %}
            <div class="upload-box">
                <label class="upload-label" for="uploadFile">Upload Knowledge File</label>
                <input type="file" id="uploadFile" accept=".txt,.pdf">
                <button type="button" class="upload-btn" id="uploadButton">Upload to DB</button>
                <div class="upload-status" id="uploadStatus">Upload a .txt or .pdf file to store it in the vector database.</div>
                <div class="upload-status" id="storedDocsStatus">Checking stored knowledge files...</div>
                <div class="upload-status stored-docs-list" id="storedDocsList"></div>
            </div>
            {% endif %}
        </aside>

        <section class="chat-panel">
            <div class="chat-header">
                <h1 class="chat-title">Chat Space</h1>
                <p class="chat-subtitle">Start your conversation with Vulnerable AI.</p>
            </div>

            <div class="chat-space" id="chatSpace">
                <div class="message bot">Hello! I am ready to chat with you.</div>
            </div>

           <form class="chat-input" id="chatForm">
                <textarea id="chatMessage" placeholder="Type your message here"></textarea>
                <button type="submit" id="sendButton">Send</button>
            </form>
        </section>
    </div>
</div>

<script>
    const chatForm = document.getElementById("chatForm");
    const chatMessage = document.getElementById("chatMessage");
    const chatSpace = document.getElementById("chatSpace");
    const sendButton = document.getElementById("sendButton");
    const uploadFile = document.getElementById("uploadFile");
    const uploadButton = document.getElementById("uploadButton");
    const uploadStatus = document.getElementById("uploadStatus");
    const storedDocsStatus = document.getElementById("storedDocsStatus");
    const storedDocsList = document.getElementById("storedDocsList");

    function arrayBufferToBase64(buffer) {
        let binary = "";
        const bytes = new Uint8Array(buffer);
        const chunkSize = 0x8000;

        for (let i = 0; i < bytes.length; i += chunkSize) {
            const chunk = bytes.subarray(i, i + chunkSize);
            binary += String.fromCharCode(...chunk);
        }

        return btoa(binary);
    }

    function appendMessage(text, type) {
        const message = document.createElement("div");
        message.className = `message ${type}`;
        message.textContent = text;
        chatSpace.appendChild(message);
        chatSpace.scrollTop = chatSpace.scrollHeight;
    }

    function renderStoredDocuments(documents) {
        if (!documents.length) {
            storedDocsStatus.textContent = "No knowledge files uploaded yet.";
            storedDocsList.textContent = "";
            return;
        }

        storedDocsStatus.textContent = "Knowledge files already stored:";
        storedDocsList.innerHTML = documents
            .map((document) => `${document.filename} (${document.chunks_stored} chunks)`)
            .join("<br>");
    }

    async function loadStoredDocuments() {
        storedDocsStatus.textContent = "Checking stored knowledge files...";
        storedDocsList.textContent = "";

        try {
            const response = await fetch("/api/documents");
            const data = await response.json();

            if (!response.ok) {
                storedDocsStatus.textContent = data.error || "Unable to load stored knowledge files.";
                return;
            }

            renderStoredDocuments(data.documents || []);
        } catch (error) {
            storedDocsStatus.textContent = "Unable to load stored knowledge files.";
        }
    }

    chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const message = chatMessage.value.trim();
        if (!message) {
            return;
        }

        appendMessage(message, "user");
        chatMessage.value = "";
        sendButton.disabled = true;
        sendButton.textContent = "Sending...";

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            if (!response.ok) {
                appendMessage(data.error || "Something went wrong.", "bot");
            } else {
                appendMessage(data.reply || "No response received.", "bot");
            }
        } catch (error) {
            appendMessage("Unable to reach the backend chat service.", "bot");
        } finally {
            sendButton.disabled = false;
            sendButton.textContent = "Send";
            chatMessage.focus();
        }
    });

    if (uploadButton && uploadFile && uploadStatus && storedDocsStatus && storedDocsList) {
        uploadButton.addEventListener("click", async () => {
            const file = uploadFile.files[0];
            if (!file) {
                uploadStatus.textContent = "Please choose a file first.";
                return;
            }

            const lowerName = file.name.toLowerCase();
            if (!lowerName.endsWith(".txt") && !lowerName.endsWith(".pdf")) {
                uploadStatus.textContent = "Only .txt and .pdf files are supported.";
                return;
            }

            uploadButton.disabled = true;
            uploadButton.textContent = "Uploading...";
            uploadStatus.textContent = `Reading ${file.name}...`;

            try {
                const payload = { filename: file.name };

                if (lowerName.endsWith(".pdf")) {
                    const buffer = await file.arrayBuffer();
                    payload.content_b64 = arrayBufferToBase64(buffer);
                } else {
                    payload.content = await file.text();
                }

                uploadStatus.textContent = `Uploading ${file.name} to the database...`;

                const response = await fetch("/api/upload", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok) {
                    uploadStatus.textContent = data.error || "Upload failed.";
                } else {
                    uploadStatus.textContent = data.message || "Upload completed.";
                    appendMessage(`Uploaded ${file.name} to the knowledge base.`, "bot");
                    await loadStoredDocuments();
                }
            } catch (error) {
                uploadStatus.textContent = "Unable to read or upload the selected file.";
            } finally {
                uploadButton.disabled = false;
                uploadButton.textContent = "Upload to DB";
            }
        });

        loadStoredDocuments();
    }
</script>
