<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerable AI Chat Bot - Register</title>
    <style>
        :root {
            --panel: rgba(255, 255, 255, 0.94);
            --panel-edge: rgba(169, 73, 141, 0.24);
            --text: #16325c;
            --muted: #8c4a74;
            --primary: #e12b5d;
            --primary-strong: #8724b6;
            --glow: rgba(128, 33, 122, 0.28);
            --input-bg: #f8fbff;
            --input-border: rgba(47, 109, 201, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("/static/images/loginpagebg.png") center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(160deg, rgba(255, 245, 250, 0.95), rgba(246, 235, 255, 0.94));
            border-radius: 24px;
            border: 1px solid var(--panel-edge);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 70px rgba(92, 24, 84, 0.24);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, rgba(225, 43, 93, 0.96), rgba(134, 36, 182, 0.94));
            padding: 34px 24px 28px;
            text-align: center;
            color: #fff6fc;
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
        }

        .header h1 {
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 230, 243, 0.9);
        }

        .form-container {
            padding: 30px 30px 26px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--input-border);
            border-radius: 14px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(225, 43, 93, 0.12);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(225, 43, 93, 0.96), rgba(134, 36, 182, 0.94));
            color: #f7fbff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 14px 28px var(--glow);
        }

        .register-btn:hover {
            box-shadow: 0 18px 34px rgba(128, 33, 122, 0.36);
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.08);
            color: #b42332;
            border: 1px solid rgba(220, 53, 69, 0.12);
        }

        .message.success {
            background: rgba(44, 157, 93, 0.1);
            color: #1f7a46;
            border: 1px solid rgba(44, 157, 93, 0.16);
        }

        .account-link {
            margin-top: 18px;
            text-align: center;
            color: #6c5779;
            font-size: 14px;
        }

        .account-link a {
            color: #b03fa5;
            font-weight: 600;
            text-decoration: none;
        }

        .footer {
            background: linear-gradient(135deg, rgba(255, 238, 245, 0.95), rgba(245, 232, 255, 0.94));
            padding: 18px 20px 22px;
            text-align: center;
            border-top: 1px solid rgba(169, 73, 141, 0.18);
        }

        .footer p {
            font-size: 12px;
            color: #8c4a74;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }

            .form-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Create Account</h1>
            <p>Register to access the Vulnerable AI dashboard</p>
        </div>

        <div class="form-container">
            {% if error_message %}
            <div class="message error">{{ error_message }}</div>
            {% endif %}

            {% if success_message %}
            <div class="message success">{{ success_message }}</div>
            {% endif %}

            <form method="post" action="/register">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required autocomplete="new-password">
                </div>

                <button type="submit" class="register-btn">Register</button>
            </form>

            <div class="account-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>

        <div class="footer">
            <p>New accounts are saved in the local users store for this app.</p>
        </div>
    </div>
</body>
</html>
